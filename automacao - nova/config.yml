app:
  data_dir: "./data"
  stop_on_error: false
  default_sync_mode: "upsert"
  rejections_dir: "./logs/rejections"
  refresh_timeout_seconds: 300
  refresh_poll_seconds: 3
  log_level: "WARNING"

supabase:
  connect_timeout_seconds: 15
  statement_timeout_seconds: 1800
  pool_size: 3
  max_overflow: 5
  pool_timeout: 20
  pool_recycle: 1800

tables:
  db_entrada_notas:
    file: "DB_ENTRADA_NOTAS.xlsx"
    sheet: "DB_ENTRADA"
    mode: "full_replace"
    unique_keys: ["cd", "seq_entrada", "nf", "coddv"]
    required_columns: ["cd", "seq_entrada", "nf", "coddv"]
    refresh_before_load: false
    types:
      cd: "integer"
      dh_consistida: "timestamp"
      dh_liberacao: "timestamp"
      transportadora: "text"
      forn: "text"
      seq_entrada: "bigint"
      nf: "bigint"
      coddv: "integer"
      descricao: "text"
      qtd_cx: "integer"
      un_por_cx: "integer"
      qtd_total: "integer"
      vl_tt: "numeric"

  db_atendimento:
    file: "DB_ATENDIMENTO.xlsx"
    sheet: "DB_ATENDIMENTO"
    mode: "full_replace"
    unique_keys: []
    required_columns: ["cd", "pedido", "coddv", "ocorrencia"]
    refresh_before_load: false
    types:
